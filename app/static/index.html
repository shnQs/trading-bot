<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    /* Chart layout — plain CSS, no Tailwind, guaranteed at parse time */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    #app { display: flex; flex-direction: column; height: 100vh; background: #030712; color: #e5e7eb; font-family: ui-monospace, monospace; font-size: 13px; }

    #topbar    { flex-shrink: 0; }
    #statsbar  { flex-shrink: 0; }

    #main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* Left: chart column */
    #chartCol { display: flex; flex-direction: column; flex: 1; min-width: 0; border-right: 1px solid #1f2937; }
    #chartContainer { flex: 1; min-height: 0; position: relative; }
    #priceChart     { position: absolute; inset: 0; }
    #chartLegend    { position: absolute; top: 8px; left: 8px; display: flex; gap: 12px; font-size: 11px; pointer-events: none; z-index: 10; }

    #rsiContainer   { height: 100px; flex-shrink: 0; border-top: 1px solid #1f2937; position: relative; }
    #rsiChart       { position: absolute; inset: 0; }
    #rsiLabel       { position: absolute; top: 4px; left: 8px; font-size: 11px; color: #6b7280; pointer-events: none; z-index: 10; }

    #macdContainer  { height: 100px; flex-shrink: 0; border-top: 1px solid #1f2937; position: relative; }
    #macdChart      { position: absolute; inset: 0; }
    #macdLabel      { position: absolute; top: 4px; left: 8px; font-size: 11px; color: #6b7280; pointer-events: none; z-index: 10; }

    /* Right: sidebar */
    #sidebar { width: 384px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
  </style>
</head>
<body>

<div id="app" x-data="app()" x-init="init()">

  <!-- Top bar -->
  <header id="topbar" class="bg-gray-900 border-b border-gray-800 px-4 py-2 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-base font-bold text-yellow-400">⚡ TradingBot</span>
      <span class="text-xs px-2 py-0.5 rounded"
            :class="botStatus.testnet ? 'bg-blue-900 text-blue-300' : 'bg-red-900 text-red-300'">
        <span x-text="botStatus.testnet ? 'TESTNET' : 'LIVE'"></span>
      </span>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-1.5 text-xs">
        <span class="w-2 h-2 rounded-full" :class="wsConnected ? 'bg-green-400' : 'bg-red-500'"></span>
        <span x-text="wsConnected ? 'Live' : 'Disconnected'" class="text-gray-400"></span>
      </div>
      <button @click="toggleBot()"
              class="px-3 py-1.5 rounded text-xs font-semibold"
              :class="botStatus.running ? 'bg-red-700 hover:bg-red-600 text-white' : 'bg-green-700 hover:bg-green-600 text-white'">
        <span x-text="botStatus.running ? '⏹ Stop Bot' : '▶ Start Bot'"></span>
      </button>
    </div>
  </header>

  <!-- Stats bar -->
  <div id="statsbar" class="bg-gray-900 border-b border-gray-800 px-4 py-2 flex items-center gap-6 text-xs overflow-x-auto">
    <div><span class="text-gray-500">Balance </span><span class="font-semibold text-white" x-text="fmt(portfolio.total_balance_usdt) + ' USDT'">—</span></div>
    <div><span class="text-gray-500">Today PnL </span>
      <span class="font-semibold" :class="portfolio.realized_pnl_today >= 0 ? 'text-green-400' : 'text-red-400'" x-text="fmtPnl(portfolio.realized_pnl_today) + ' USDT'">—</span></div>
    <div><span class="text-gray-500">Total PnL </span>
      <span class="font-semibold" :class="portfolio.realized_pnl_total >= 0 ? 'text-green-400' : 'text-red-400'" x-text="fmtPnl(portfolio.realized_pnl_total) + ' USDT'">—</span></div>
    <div><span class="text-gray-500">Win Rate </span><span class="font-semibold text-white" x-text="winRate() + '%'">—</span></div>
    <div><span class="text-gray-500">Open </span><span class="font-semibold text-white" x-text="portfolio.open_trades_count ?? 0">—</span></div>
    <div><span class="text-gray-500">Max DD </span><span class="font-semibold text-red-400" x-text="(portfolio.max_drawdown_pct ?? 0).toFixed(2) + '%'">—</span></div>
    <div class="ml-auto flex items-center gap-2">
      <span class="text-gray-500">Pair:</span>
      <select x-model="selectedSymbol" @change="loadCandles()" class="bg-gray-800 border border-gray-700 rounded px-2 py-0.5 text-white text-xs">
        <template x-for="pair in botStatus.trading_pairs" :key="pair">
          <option :value="pair" x-text="pair"></option>
        </template>
      </select>
    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Chart column -->
    <div id="chartCol">
      <div id="chartContainer">
        <div id="priceChart"></div>
        <div id="chartLegend">
          <span style="color:#8b949e">
            <span style="display:inline-block;width:12px;height:2px;background:#58a6ff;vertical-align:middle;margin-right:3px"></span>EMA9
          </span>
          <span style="color:#8b949e">
            <span style="display:inline-block;width:12px;height:2px;background:#bc8cff;vertical-align:middle;margin-right:3px"></span>EMA21
          </span>
        </div>
      </div>
      <div id="rsiContainer">
        <div id="rsiChart"></div>
        <span id="rsiLabel">RSI(14)</span>
      </div>
      <div id="macdContainer">
        <div id="macdChart"></div>
        <span id="macdLabel">MACD(12,26,9)</span>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="bg-gray-950">

      <!-- Risk config -->
      <div class="border-b border-gray-800 p-3 flex-shrink-0">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Risk Config</span>
          <button @click="saveConfig()" class="text-xs bg-yellow-600 hover:bg-yellow-500 px-2 py-0.5 rounded text-white">Save</button>
        </div>
        <div class="grid grid-cols-2 gap-2 text-xs">
          <label class="flex flex-col gap-0.5">
            <span class="text-gray-500">Risk/Trade %</span>
            <input type="number" step="0.1" x-model.number="config.risk_per_trade_pct"
                   class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white w-full"/>
          </label>
          <label class="flex flex-col gap-0.5">
            <span class="text-gray-500">Max Trades</span>
            <input type="number" step="1" x-model.number="config.max_open_trades"
                   class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white w-full"/>
          </label>
          <label class="flex flex-col gap-0.5">
            <span class="text-gray-500">Stop Loss %</span>
            <input type="number" step="0.1" x-model.number="config.stop_loss_pct"
                   class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white w-full"/>
          </label>
          <label class="flex flex-col gap-0.5">
            <span class="text-gray-500">Take Profit %</span>
            <input type="number" step="0.1" x-model.number="config.take_profit_pct"
                   class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white w-full"/>
          </label>
        </div>
      </div>

      <!-- Open trades -->
      <div class="flex flex-col border-b border-gray-800 flex-shrink-0" style="max-height:40%">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-800">
          Open Trades (<span x-text="openTrades.length"></span>)
        </div>
        <div class="overflow-y-auto">
          <template x-if="openTrades.length === 0">
            <p class="text-gray-600 text-xs text-center py-4">No open trades</p>
          </template>
          <table class="w-full text-xs">
            <tbody>
              <template x-for="t in openTrades" :key="t.id">
                <tr class="border-b border-gray-900 hover:bg-gray-900">
                  <td class="px-2 py-1.5">
                    <div class="font-semibold text-white" x-text="t.symbol"></div>
                    <div class="text-gray-500" x-text="'Entry: ' + fmt(t.entry_price)"></div>
                  </td>
                  <td class="px-2 py-1.5 text-right">
                    <div class="text-gray-400" x-text="fmt(t.quantity) + ' qty'"></div>
                    <div class="text-gray-400 text-xs">SL: <span x-text="fmt(t.stop_loss)"></span></div>
                  </td>
                  <td class="px-2 py-1.5 text-right">
                    <div class="text-gray-400 text-xs">TP: <span x-text="fmt(t.take_profit)"></span></div>
                    <div class="text-gray-500 text-xs" x-text="timeSince(t.entry_time)"></div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Closed trades -->
      <div class="flex flex-col flex-1 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-800">
          Trade History (<span x-text="closedTrades.length"></span>)
        </div>
        <div class="overflow-y-auto flex-1">
          <template x-if="closedTrades.length === 0">
            <p class="text-gray-600 text-xs text-center py-4">No closed trades yet</p>
          </template>
          <table class="w-full text-xs">
            <tbody>
              <template x-for="t in closedTrades" :key="t.id">
                <tr class="border-b border-gray-900 hover:bg-gray-900">
                  <td class="px-2 py-1.5">
                    <div class="font-semibold text-white" x-text="t.symbol"></div>
                    <div class="text-gray-500" x-text="fmt(t.entry_price) + ' → ' + fmt(t.exit_price)"></div>
                  </td>
                  <td class="px-2 py-1.5 text-right">
                    <div :class="t.pnl_usdt >= 0 ? 'text-green-400' : 'text-red-400'" x-text="fmtPnl(t.pnl_usdt) + ' USDT'"></div>
                    <div :class="t.pnl_pct >= 0 ? 'text-green-500' : 'text-red-500'" x-text="fmtPnl(t.pnl_pct) + '%'"></div>
                  </td>
                  <td class="px-2 py-1.5 text-right text-gray-500">
                    <div x-text="t.exit_reason || '—'"></div>
                    <div x-text="formatDate(t.exit_time)"></div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div x-show="toast.show" x-transition
       class="fixed bottom-4 right-4 px-4 py-2 rounded shadow-lg text-sm z-50"
       :class="toast.type === 'error' ? 'bg-red-700' : 'bg-green-700'"
       x-text="toast.message"></div>

</div>

<script src="/app.js"></script>
</body>
</html>
