<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 font-mono text-sm min-h-screen">

<div x-data="app()" x-init="init()" class="flex flex-col h-screen">

  <!-- Top bar -->
  <header class="bg-gray-900 border-b border-gray-800 px-4 py-2 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <span class="text-lg font-bold text-yellow-400">⚡ TradingBot</span>
      <span class="text-xs px-2 py-0.5 rounded"
            :class="botStatus.testnet ? 'bg-blue-900 text-blue-300' : 'bg-red-900 text-red-300'">
        <span x-text="botStatus.testnet ? 'TESTNET' : 'LIVE'"></span>
      </span>
    </div>

    <div class="flex items-center gap-4">
      <!-- WS status -->
      <div class="flex items-center gap-1.5 text-xs">
        <span class="w-2 h-2 rounded-full" :class="wsConnected ? 'bg-green-400 animate-pulse' : 'bg-red-500'"></span>
        <span x-text="wsConnected ? 'Live' : 'Disconnected'" class="text-gray-400"></span>
      </div>

      <!-- Bot toggle -->
      <button @click="toggleBot()"
              class="px-3 py-1.5 rounded text-xs font-semibold transition-colors"
              :class="botStatus.running
                ? 'bg-red-700 hover:bg-red-600 text-white'
                : 'bg-green-700 hover:bg-green-600 text-white'">
        <span x-text="botStatus.running ? '⏹ Stop Bot' : '▶ Start Bot'"></span>
      </button>
    </div>
  </header>

  <!-- Portfolio stats bar -->
  <div class="bg-gray-900 border-b border-gray-800 px-4 py-2 flex items-center gap-6 text-xs shrink-0 overflow-x-auto">
    <div>
      <span class="text-gray-500">Balance</span>
      <span class="ml-1 font-semibold text-white" x-text="fmt(portfolio.total_balance_usdt) + ' USDT'">—</span>
    </div>
    <div>
      <span class="text-gray-500">Today PnL</span>
      <span class="ml-1 font-semibold"
            :class="portfolio.realized_pnl_today >= 0 ? 'text-green-400' : 'text-red-400'"
            x-text="fmtPnl(portfolio.realized_pnl_today) + ' USDT'">—</span>
    </div>
    <div>
      <span class="text-gray-500">Total PnL</span>
      <span class="ml-1 font-semibold"
            :class="portfolio.realized_pnl_total >= 0 ? 'text-green-400' : 'text-red-400'"
            x-text="fmtPnl(portfolio.realized_pnl_total) + ' USDT'">—</span>
    </div>
    <div>
      <span class="text-gray-500">Win Rate</span>
      <span class="ml-1 font-semibold text-white" x-text="winRate() + '%'">—</span>
    </div>
    <div>
      <span class="text-gray-500">Open Trades</span>
      <span class="ml-1 font-semibold text-white" x-text="portfolio.open_trades_count ?? 0">—</span>
    </div>
    <div>
      <span class="text-gray-500">Max DD</span>
      <span class="ml-1 font-semibold text-red-400" x-text="(portfolio.max_drawdown_pct ?? 0).toFixed(2) + '%'">—</span>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <span class="text-gray-500">Pair:</span>
      <select x-model="selectedSymbol" @change="loadCandles()" class="bg-gray-800 border border-gray-700 rounded px-2 py-0.5 text-white">
        <template x-for="pair in botStatus.trading_pairs" :key="pair">
          <option :value="pair" x-text="pair"></option>
        </template>
      </select>
    </div>
  </div>

  <!-- Main content -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Left: Charts -->
    <div class="flex flex-col flex-1 overflow-hidden border-r border-gray-800">

      <!-- Price chart -->
      <div class="relative flex-1 min-h-0">
        <div id="priceChart" class="w-full h-full"></div>
        <div class="absolute top-2 left-2 flex gap-3 text-xs pointer-events-none">
          <span class="flex items-center gap-1"><span class="w-3 h-0.5 bg-blue-400 inline-block"></span>EMA9</span>
          <span class="flex items-center gap-1"><span class="w-3 h-0.5 bg-orange-400 inline-block"></span>EMA21</span>
        </div>
      </div>

      <!-- RSI chart -->
      <div class="h-24 border-t border-gray-800 relative">
        <div id="rsiChart" class="w-full h-full"></div>
        <span class="absolute top-1 left-2 text-xs text-gray-500 pointer-events-none">RSI(14)</span>
      </div>

      <!-- MACD chart -->
      <div class="h-24 border-t border-gray-800 relative">
        <div id="macdChart" class="w-full h-full"></div>
        <span class="absolute top-1 left-2 text-xs text-gray-500 pointer-events-none">MACD(12,26,9)</span>
      </div>
    </div>

    <!-- Right: Tables + controls -->
    <div class="w-96 flex flex-col overflow-hidden bg-gray-950">

      <!-- Risk config panel -->
      <div class="border-b border-gray-800 p-3 shrink-0">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Risk Config</span>
          <button @click="saveConfig()" class="text-xs bg-yellow-600 hover:bg-yellow-500 px-2 py-0.5 rounded">Save</button>
        </div>
        <div class="grid grid-cols-2 gap-2 text-xs">
          <label class="flex flex-col gap-0.5">
            <span class="text-gray-500">Risk/Trade %</span>
            <input type="number" step="0.1" x-model.number="config.risk_per_trade_pct"
                   class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white w-full"/>
          </label>
          <label class="flex flex-col gap-0.5">
            <span class="text-gray-500">Max Trades</span>
            <input type="number" step="1" x-model.number="config.max_open_trades"
                   class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white w-full"/>
          </label>
          <label class="flex flex-col gap-0.5">
            <span class="text-gray-500">Stop Loss %</span>
            <input type="number" step="0.1" x-model.number="config.stop_loss_pct"
                   class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white w-full"/>
          </label>
          <label class="flex flex-col gap-0.5">
            <span class="text-gray-500">Take Profit %</span>
            <input type="number" step="0.1" x-model.number="config.take_profit_pct"
                   class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white w-full"/>
          </label>
        </div>
      </div>

      <!-- Open trades -->
      <div class="flex flex-col border-b border-gray-800 shrink-0" style="max-height: 40%">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-800">
          Open Trades (<span x-text="openTrades.length"></span>)
        </div>
        <div class="overflow-y-auto flex-1">
          <template x-if="openTrades.length === 0">
            <p class="text-gray-600 text-xs text-center py-4">No open trades</p>
          </template>
          <table class="w-full text-xs">
            <tbody>
              <template x-for="t in openTrades" :key="t.id">
                <tr class="border-b border-gray-900 hover:bg-gray-900">
                  <td class="px-2 py-1.5">
                    <div class="font-semibold text-white" x-text="t.symbol"></div>
                    <div class="text-gray-500" x-text="'Entry: ' + fmt(t.entry_price)"></div>
                  </td>
                  <td class="px-2 py-1.5 text-right">
                    <div class="text-gray-400" x-text="fmt(t.quantity) + ' qty'"></div>
                    <div class="text-xs" :class="'text-gray-400'">SL: <span x-text="fmt(t.stop_loss)"></span></div>
                  </td>
                  <td class="px-2 py-1.5 text-right">
                    <div class="text-xs text-gray-400">TP: <span x-text="fmt(t.take_profit)"></span></div>
                    <div class="text-xs" x-text="timeSince(t.entry_time)" class="text-gray-500"></div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Closed trades -->
      <div class="flex flex-col flex-1 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-800">
          Trade History (<span x-text="closedTrades.length"></span>)
        </div>
        <div class="overflow-y-auto flex-1">
          <template x-if="closedTrades.length === 0">
            <p class="text-gray-600 text-xs text-center py-4">No closed trades yet</p>
          </template>
          <table class="w-full text-xs">
            <tbody>
              <template x-for="t in closedTrades" :key="t.id">
                <tr class="border-b border-gray-900 hover:bg-gray-900">
                  <td class="px-2 py-1.5">
                    <div class="font-semibold text-white" x-text="t.symbol"></div>
                    <div class="text-gray-500" x-text="fmt(t.entry_price) + ' → ' + fmt(t.exit_price)"></div>
                  </td>
                  <td class="px-2 py-1.5 text-right">
                    <div :class="t.pnl_usdt >= 0 ? 'text-green-400' : 'text-red-400'"
                         x-text="fmtPnl(t.pnl_usdt) + ' USDT'"></div>
                    <div :class="t.pnl_pct >= 0 ? 'text-green-500' : 'text-red-500'"
                         x-text="fmtPnl(t.pnl_pct) + '%'"></div>
                  </td>
                  <td class="px-2 py-1.5 text-right text-gray-500">
                    <div x-text="t.exit_reason || '—'"></div>
                    <div x-text="formatDate(t.exit_time)"></div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification toast -->
  <div x-show="toast.show" x-transition
       class="fixed bottom-4 right-4 px-4 py-2 rounded shadow-lg text-sm z-50"
       :class="toast.type === 'error' ? 'bg-red-700' : 'bg-green-700'"
       x-text="toast.message"></div>

</div>

<script src="/app.js"></script>
</body>
</html>
