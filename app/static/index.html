<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot Dashboard</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #030712; }
    body { font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: #e5e7eb; }

    /* ─── Root fills the viewport exactly ─────────────────────────── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #030712;
    }

    /* ─── Topbar ───────────────────────────────────────────────────── */
    #topbar {
      height: 44px;
      flex-shrink: 0;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .t-left  { display: flex; align-items: center; gap: 12px; }
    .t-right { display: flex; align-items: center; gap: 14px; }
    .brand   { font-size: 15px; font-weight: 700; color: #facc15; }
    .badge   { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    .badge-test { background: #1e3a5f; color: #93c5fd; }
    .badge-live { background: #450a0a; color: #fca5a5; }
    .dot    { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .dot-on { background: #4ade80; }
    .dot-off{ background: #ef4444; }
    .ws-lbl { color: #9ca3af; font-size: 12px; }
    .btn    { border: none; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; color: #fff; font-family: inherit; padding: 5px 12px; }
    .btn-go   { background: #15803d; } .btn-go:hover   { background: #16a34a; }
    .btn-stop { background: #b91c1c; } .btn-stop:hover { background: #dc2626; }
    .btn-scan { background: #1d4ed8; } .btn-scan:hover { background: #2563eb; }
    .badge-scan-on  { background: #14532d; color: #86efac; }
    .badge-scan-off { background: #292524; color: #a8a29e; }
    .btn-save { background: #a16207; font-size: 11px; padding: 3px 10px; } .btn-save:hover { background: #ca8a04; }

    /* ─── Statsbar ─────────────────────────────────────────────────── */
    #statsbar {
      height: 34px;
      flex-shrink: 0;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      overflow-x: auto;
      white-space: nowrap;
    }
    .sl  { color: #6b7280; }
    .sv  { font-weight: 600; color: #f9fafb; }
    .pos { font-weight: 600; color: #4ade80; }
    .neg { font-weight: 600; color: #f87171; }
    .ps  { display: flex; align-items: center; gap: 8px; }
    select { background: #1f2937; border: 1px solid #374151; border-radius: 4px; padding: 2px 8px; color: #f9fafb; font-size: 12px; font-family: inherit; }

    /* ─── Main row ─────────────────────────────────────────────────── */
    #main {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
    }

    /* ─── Interval toolbar ─────────────────────────────────────────── */
    #intervalBar {
      height: 32px;
      flex-shrink: 0;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .iv-btn {
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      padding: 3px 10px;
      background: transparent;
      color: #6b7280;
    }
    .iv-btn:hover { background: #1f2937; color: #f9fafb; }
    .iv-btn.active { background: #1d4ed8; color: #fff; }

    /* ─── Chart column ─────────────────────────────────────────────── */
    #chartCol {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid #1f2937;
    }

    /* Price chart fills remaining space */
    #priceWrap {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    #priceChart { position: absolute; inset: 0; }

    #chartLegend {
      position: absolute; top: 8px; left: 8px;
      display: flex; gap: 12px; font-size: 11px;
      pointer-events: none; z-index: 10; color: #8b949e;
    }
    .leg { display: inline-block; width: 12px; height: 2px; vertical-align: middle; margin-right: 3px; }

    /* RSI and MACD are fixed-height slots */
    #rsiWrap, #macdWrap {
      height: 100px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      border-top: 1px solid #1f2937;
    }
    #rsiChart, #macdChart { position: absolute; inset: 0; }
    .chart-lbl {
      position: absolute; top: 4px; left: 8px;
      font-size: 11px; color: #6b7280;
      pointer-events: none; z-index: 10;
    }

    /* ─── Sidebar ──────────────────────────────────────────────────── */
    #sidebar {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0a0f1a;
    }

    /* Risk config */
    #riskCfg {
      flex-shrink: 0;
      padding: 10px 12px;
      border-bottom: 1px solid #1f2937;
    }
    .cfghdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cfgtit { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; }
    .cfggrd { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cfgf   { display: flex; flex-direction: column; gap: 3px; }
    .cfgf label { font-size: 11px; color: #9ca3af; }
    .cfgf input { background: #1f2937; border: 1px solid #374151; border-radius: 4px; padding: 4px 8px; color: #f9fafb; font-size: 12px; font-family: inherit; width: 100%; }

    /* Trade panels */
    .tpanel { display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid #1f2937; }
    #openPanel  { flex: 0 0 38%; }
    #closedPanel{ flex: 1; }
    .phdr { flex-shrink: 0; padding: 7px 12px; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #1f2937; }
    .pscroll { overflow-y: auto; flex: 1; }

    table { width: 100%; border-collapse: collapse; }
    tr    { border-bottom: 1px solid #111827; }
    tr:hover { background: #111827; }
    td    { padding: 6px 10px; font-size: 12px; vertical-align: top; }
    .tr   { text-align: right; }
    .sym  { font-weight: 600; color: #f9fafb; }
    .dim  { color: #6b7280; font-size: 11px; }
    .green{ color: #4ade80; }
    .red  { color: #f87171; }
    .empty{ color: #4b5563; text-align: center; padding: 16px; font-size: 12px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 16px; right: 16px;
      padding: 10px 16px; border-radius: 6px;
      font-size: 13px; font-weight: 500; z-index: 100;
    }
    #toast.info  { background: #15803d; color: #fff; }
    #toast.error { background: #b91c1c; color: #fff; }
  </style>
</head>
<body>
<div id="app" x-data="app()">

  <header id="topbar">
    <div class="t-left">
      <span class="brand">⚡ TradingBot</span>
      <span class="badge" :class="botStatus.testnet ? 'badge-test' : 'badge-live'"
            x-text="botStatus.testnet ? 'TESTNET' : 'LIVE'"></span>
    </div>
    <div class="t-right">
      <span class="dot" :class="wsConnected ? 'dot-on' : 'dot-off'"></span>
      <span class="ws-lbl" x-text="wsConnected ? 'Live' : 'Disconnected'"></span>
      <span class="badge" :class="botStatus.pair_scan_enabled ? 'badge-scan-on' : 'badge-scan-off'"
            x-text="botStatus.pair_scan_enabled ? '⟳ Auto-scan' : 'Manual pairs'"></span>
      <button class="btn btn-scan" @click="rescan()" x-text="scanning ? 'Scanning...' : 'Rescan'"></button>
      <button class="btn" :class="botStatus.running ? 'btn-stop' : 'btn-go'"
              @click="toggleBot()"
              x-text="botStatus.running ? '⏹ Stop Bot' : '▶ Start Bot'"></button>
    </div>
  </header>

  <div id="statsbar">
    <span><span class="sl">Balance </span><span class="sv" x-text="fmt(portfolio.total_balance_usdt) + ' USDT'"></span></span>
    <span><span class="sl">Today PnL </span><span :class="portfolio.realized_pnl_today >= 0 ? 'pos' : 'neg'" x-text="fmtPnl(portfolio.realized_pnl_today) + ' USDT'"></span></span>
    <span><span class="sl">Total PnL </span><span :class="portfolio.realized_pnl_total >= 0 ? 'pos' : 'neg'" x-text="fmtPnl(portfolio.realized_pnl_total) + ' USDT'"></span></span>
    <span><span class="sl">Win Rate </span><span class="sv" x-text="winRate() + '%'"></span></span>
    <span><span class="sl">Open </span><span class="sv" x-text="portfolio.open_trades_count ?? 0"></span></span>
    <span><span class="sl">Max DD </span><span class="red" x-text="(portfolio.max_drawdown_pct ?? 0).toFixed(2) + '%'"></span></span>
    <span x-show="crosshairPrice != null" style="margin-left:auto;margin-right:0">
      <span class="sl">Price </span><span class="sv" x-text="fmtPrice(crosshairPrice)"></span>
    </span>
    <span class="ps" :style="crosshairPrice != null ? '' : 'margin-left:auto'">
      <span class="sl">Pair:</span>
      <select x-model="selectedSymbol" @change="loadCandles()">
        <template x-for="pair in botStatus.trading_pairs" :key="pair">
          <option :value="pair" x-text="pair"></option>
        </template>
      </select>
    </span>
  </div>

  <div id="intervalBar">
    <template x-for="iv in intervals" :key="iv">
      <button class="iv-btn" :class="selectedInterval === iv ? 'active' : ''"
              @click="changeInterval(iv)" x-text="iv"></button>
    </template>
  </div>

  <div id="main">

    <div id="chartCol">
      <div id="priceWrap">
        <div id="priceChart"></div>
        <div id="chartLegend">
          <span><span class="leg" style="background:#58a6ff"></span>EMA9</span>
          <span><span class="leg" style="background:#bc8cff"></span>EMA21</span>
        </div>
      </div>
      <div id="rsiWrap">
        <div id="rsiChart"></div>
        <span class="chart-lbl">RSI(14)</span>
      </div>
      <div id="macdWrap">
        <div id="macdChart"></div>
        <span class="chart-lbl">MACD(12,26,9)</span>
      </div>
    </div>

    <div id="sidebar">
      <div id="riskCfg">
        <div class="cfghdr">
          <span class="cfgtit">Risk Config</span>
          <button class="btn btn-save" @click="saveConfig()">Save</button>
        </div>
        <div class="cfggrd">
          <div class="cfgf"><label for="cfg-risk">Risk/Trade %</label><input id="cfg-risk" name="risk_per_trade_pct" type="number" step="0.1" x-model.number="config.risk_per_trade_pct"/></div>
          <div class="cfgf"><label for="cfg-max">Max Trades</label><input id="cfg-max" name="max_open_trades" type="number" step="1" x-model.number="config.max_open_trades"/></div>
          <div class="cfgf"><label for="cfg-sl">Stop Loss %</label><input id="cfg-sl" name="stop_loss_pct" type="number" step="0.1" x-model.number="config.stop_loss_pct"/></div>
          <div class="cfgf"><label for="cfg-tp">Take Profit %</label><input id="cfg-tp" name="take_profit_pct" type="number" step="0.1" x-model.number="config.take_profit_pct"/></div>
        </div>
      </div>

      <div class="tpanel" id="openPanel">
        <div class="phdr">Open Trades (<span x-text="openTrades.length"></span>)</div>
        <div class="pscroll">
          <template x-if="openTrades.length === 0"><p class="empty">No open trades</p></template>
          <table><tbody>
            <template x-for="t in openTrades" :key="t.id">
              <tr>
                <td><div class="sym" x-text="t.symbol"></div><div class="dim" x-text="'Entry: ' + fmt(t.entry_price)"></div></td>
                <td class="tr"><div class="dim" x-text="fmt(t.quantity) + ' qty'"></div><div class="dim">SL: <span x-text="fmt(t.stop_loss)"></span></div></td>
                <td class="tr"><div class="dim">TP: <span x-text="fmt(t.take_profit)"></span></div><div class="dim" x-text="timeSince(t.entry_time)"></div></td>
              </tr>
            </template>
          </tbody></table>
        </div>
      </div>

      <div class="tpanel" id="closedPanel">
        <div class="phdr">Trade History (<span x-text="closedTrades.length"></span>)</div>
        <div class="pscroll">
          <template x-if="closedTrades.length === 0"><p class="empty">No closed trades yet</p></template>
          <table><tbody>
            <template x-for="t in closedTrades" :key="t.id">
              <tr>
                <td><div class="sym" x-text="t.symbol"></div><div class="dim" x-text="fmt(t.entry_price) + ' → ' + fmt(t.exit_price)"></div></td>
                <td class="tr"><div :class="t.pnl_usdt >= 0 ? 'green' : 'red'" x-text="fmtPnl(t.pnl_usdt) + ' USDT'"></div><div :class="t.pnl_pct >= 0 ? 'green' : 'red'" x-text="fmtPnl(t.pnl_pct) + '%'"></div></td>
                <td class="tr"><div class="dim" x-text="t.exit_reason || '—'"></div><div class="dim" x-text="formatDate(t.exit_time)"></div></td>
              </tr>
            </template>
          </tbody></table>
        </div>
      </div>
    </div>

  </div>

  <div id="toast" x-show="toast.show" x-transition :class="toast.type" x-text="toast.message"></div>
</div>
<script src="/app.js?v=5"></script>
</body>
</html>
